name: validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run deploy-check
        run: |
          make PYTHON=python deploy-check
      - name: Check for tracked egg-info
        run: |
          if git ls-files | grep -q '\.egg-info/'; then
            echo "Error: .egg-info/ files are tracked in git"
            echo "Run: git rm -r --cached *.egg-info/"
            exit 1
          fi
          echo "OK: no .egg-info/ tracked"
