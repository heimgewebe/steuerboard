name: validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout PR head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Checkout current ref
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run deploy-check
        run: |
          make PYTHON=python deploy-check
      - name: Check for tracked egg-info
        run: |
          egg_info_files="$(git ls-files | grep '\.egg-info/' || true)"
          if [ -n "$egg_info_files" ]; then
            echo "Error: .egg-info/ files are tracked in git"
            echo "Tracked paths:"
            printf '%s\n' "$egg_info_files"
            echo "Run: git ls-files -z '*.egg-info/*' | xargs -0 git rm --cached"
            exit 1
          fi
          echo "OK: no .egg-info/ tracked"
