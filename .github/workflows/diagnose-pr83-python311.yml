name: finalize-pr83-python311

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feat/heimserver-service-gate-runbook'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/heimserver-service-gate-runbook
          fetch-depth: 0

      - name: Apply verified guard update
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object tests/test_heimserver_service_evidence.py)" = "9eb7a94ac9d8ad57a4d6366250978a17a78d0408"
          test "$(git hash-object tests/test_heimserver_service_gate_assessments.py)" = "4d747bf3c4c2013a4cc61a26260f6eb50ac9adf8"
          test "$(wc -c < .github/pr83-guard-update.patch.gz.b64)" = "1208"
          printf '%s  %s\n' \
            'b8f85196b5fb3cd7a09fbea91df710b9ad9fefadc9bb3bc8348ac73e0bee9b9b' \
            '.github/pr83-guard-update.patch.gz.b64' | sha256sum -c -
          base64 --decode .github/pr83-guard-update.patch.gz.b64 > /tmp/pr83-guard-update.patch.gz
          printf '%s  %s\n' \
            '848e8ddf393e0df754c10dc83d5b2f794d0a8b0f1f186451eb49fdb69b753b6b' \
            '/tmp/pr83-guard-update.patch.gz' | sha256sum -c -
          gzip -dc /tmp/pr83-guard-update.patch.gz > /tmp/pr83-guard-update.patch
          test "$(wc -c < /tmp/pr83-guard-update.patch)" = "2991"
          printf '%s  %s\n' \
            'e134ad0b4af6f6081d9f4c6dc496c69465dab1ae0907aab9a0ecf16a056b7c22' \
            '/tmp/pr83-guard-update.patch' | sha256sum -c -
          git apply --check /tmp/pr83-guard-update.patch
          git apply /tmp/pr83-guard-update.patch

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run full deploy-check
        run: make PYTHON=python deploy-check

      - name: Commit final guard update and remove diagnostics
        shell: bash
        run: |
          set -euo pipefail
          rm .github/pr83-guard-update.patch.gz.b64
          rm .github/workflows/diagnose-pr83-python311.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test(runbook): update pre-integration guards'
          git push origin HEAD:feat/heimserver-service-gate-runbook
