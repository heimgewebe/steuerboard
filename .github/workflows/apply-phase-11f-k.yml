name: cleanup-phase-11f-k-transfer

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'feat/heimserver-service-gate-runbook'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/heimserver-service-gate-runbook
          fetch-depth: 0

      - name: Remove completed transfer workflow
        shell: bash
        run: |
          set -euo pipefail
          test ! -d .github/phase-11f-k-transfer
          test -f .github/workflows/apply-phase-11f-k.yml
          rm .github/workflows/apply-phase-11f-k.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove phase 11F-K transfer workflow'
          git push origin HEAD:feat/heimserver-service-gate-runbook
